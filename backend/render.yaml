services:
  - type: web
    name: hisabkitab-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn hisabkitab.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: hisabkitab-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://hisabkitab.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: TIME_ZONE
        value: Asia/Karachi
      - key: PYTHON_VERSION
        value: 3.12.3
